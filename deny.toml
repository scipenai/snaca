[advisories]
version = 2
yanked = "warn"
ignore = [
    # Transitive through openlark -> tokio-tungstenite -> rustls-native-certs.
    # rustls-pemfile is archived, but this path is owned by the current
    # openlark dependency stack and has no direct safe upgrade in this repo.
    "RUSTSEC-2025-0134",
    # ttf-parser is unmaintained (author-declared). Pulled transitively through
    # pdf-extract -> lopdf -> ttf-parser; there is no safe upgrade available.
    # Only an unmaintained warning (no known vulnerability); revisit if lopdf
    # moves to an actively maintained font parser (e.g. skrifa).
    "RUSTSEC-2026-0192",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
