name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags so `git archive` and any history-dependent
          # release step see the complete tree, not a depth-1 shallow clone.
          fetch-depth: 0

      - name: Normalize version
        id: version
        shell: bash
        run: |
          version="${VERSION#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev
          echo "PROTOC_INCLUDE=/usr/include" >> "$GITHUB_ENV"

      - name: Build release binaries
        run: make release

      - name: Package release
        run: ./scripts/package.sh

      - name: Create source archives
        shell: bash
        run: |
          mkdir -p dist/source
          git archive --format=tar.gz \
            --prefix="snaca-${VERSION}/" \
            -o "dist/source/snaca-${VERSION}-source.tar.gz" \
            HEAD
          git archive --format=zip \
            --prefix="snaca-${VERSION}/" \
            -o "dist/source/snaca-${VERSION}-source.zip" \
            HEAD
          sha256sum dist/source/* > "dist/source/snaca-${VERSION}-source.SHA256SUMS"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SNACA v${{ steps.version.outputs.version }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/source/*
